apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finbank-new
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: nvenkatasaikiran/finbank-auth:v1
        ports:
        - containerPort: 8081
        env:
        - name: DB_HOST
          value: postgres.finbank-data.svc.cluster.local
        - name: DB_NAME
          value: finbank
        - name: DB_USER
          value: finbank
        - name: DB_PASSWORD
          value: finbank123
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finbank-new
spec:
  selector:
    app: auth-service
  ports:
  - port: 8081
    targetPort: 8081
