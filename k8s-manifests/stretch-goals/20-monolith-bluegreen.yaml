apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith-blue
  namespace: finbank-legacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monolith
      version: blue
  template:
    metadata:
      labels:
        app: monolith
        version: blue
    spec:
      containers:
      - name: monolith
        image: nvenkatasaikiran/finbank-monolith:v1
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith-green
  namespace: finbank-legacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monolith
      version: green
  template:
    metadata:
      labels:
        app: monolith
        version: green
    spec:
      containers:
      - name: monolith
        image: nvenkatasaikiran/finbank-monolith:v2
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: monolith-live
  namespace: finbank-legacy
spec:
  selector:
    app: monolith
    version: blue
  ports:
  - port: 8080
    targetPort: 8080
